<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday, Sayang 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at top,#0b1a33,#050812);
overflow-x:hidden;
color:white;
}

/* ===== STARS (lebih smooth) ===== */
.stars{
position:fixed;
inset:0;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0.5;
animation: floatStar 6s infinite ease-in-out;
}

@keyframes floatStar{
0%{transform:translateY(0);opacity:0.2}
50%{opacity:1}
100%{transform:translateY(-20px);opacity:0.2}
}

/* ===== INTRO ===== */
#intro{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(5,8,18,0.95);
z-index:10;
text-align:center;
}

#intro h1{
font-size:22px;
letter-spacing:1px;
}

#intro span{
opacity:0.7;
margin-top:10px;
font-size:13px;
}

/* ===== MAIN ===== */
.container{
position:relative;
z-index:2;
text-align:center;
padding:40px 20px;
}

.title{
font-size:30px;
font-weight:700;
}

.date{
opacity:0.7;
font-size:14px;
margin-bottom:25px;
}

/* ===== ENVELOPE UPGRADE ===== */
.envelope{
width:240px;
height:150px;
margin:0 auto;
background:linear-gradient(145deg,#ffffff,#e8eef7);
border-radius:12px;
position:relative;
cursor:pointer;
transform-style:preserve-3d;
transition:0.6s;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.envelope:hover{
transform:translateY(-5px) scale(1.02);
}

.envelope:before{
content:'';
position:absolute;
top:0;
left:0;
border-left:120px solid transparent;
border-right:120px solid transparent;
border-top:90px solid #0b1a33;
border-radius:8px;
}

/* animasi buka */
.envelope.open{
transform:scale(0.8) rotateX(60deg);
opacity:0;
}

/* ===== LETTER (upgrade glass effect) ===== */
.letter{
width:92%;
max-width:520px;
margin:30px auto;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
color:#0b1a33;
padding:22px;
border-radius:14px;
display:none;
box-shadow:0 25px 60px rgba(0,0,0,0.4);
animation: popLetter 1s ease forwards;
}

@keyframes popLetter{
from{transform:translateY(40px);opacity:0}
to{transform:translateY(0);opacity:1}
}

.letter h2{
text-align:center;
margin-bottom:10px;
}

/* typing per kalimat */
.typing{
white-space:pre-line;
font-size:14px;
line-height:1.6;
}

/* ===== POLAROID UPGRADE ===== */
.polaroid{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-top:20px;
}

.polaroid img{
width:95px;
height:95px;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transform:rotate(var(--r,0deg));
transition:0.3s;
opacity:0;
}

.polaroid img.show{
opacity:1;
transform:rotate(var(--r,0deg)) scale(1.05);
}

.polaroid img:hover{
transform:scale(1.15);
}

/* ===== HEART ===== */
.heart{
position:fixed;
top:-10px;
font-size:14px;
animation: fall linear forwards;
opacity:0.7;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* ===== CONFETTI ===== */
.confetti{
position:fixed;
width:6px;
height:10px;
top:-10px;
animation: confettiFall linear forwards;
}

@keyframes confettiFall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* ===== BUTTON ===== */
button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#0b1a33;
color:white;
cursor:pointer;
margin-top:15px;
}

iframe{
margin-top:20px;
width:100%;
max-width:520px;
height:260px;
border-radius:12px;
}

.ps{
margin-top:15px;
font-style:italic;
opacity:0.8;
font-size:13px;
}

.footer{
margin-top:18px;
font-weight:600;
}

</style>
</head>

<body>

<div class="stars"></div>

<div id="intro">
<h1>07 • 07 • 2007 🤍</h1>
<span>For someone who means everything</span>
</div>

<div class="container">

<div class="title">Happy Birthday, Sayang 🤍</div>
<div class="date">7 July 2007 🤍</div>

<div class="envelope" onclick="openEnvelope()"></div>

<div class="letter" id="letter">
<h2>From My Green To Your Blue 🤍</h2>

<div class="typing" id="text"></div>

<div class="polaroid">
<img src="foto1.jpeg" style="--r:-4deg">
<img src="foto2.jpeg" style="--r:2deg">
<img src="foto3.jpeg" style="--r:4deg">
</div>

<iframe src="https://www.youtube.com/embed/HM3DeT4UXqM"></iframe>

<div class="ps">
P.S. If someday you ever wonder how loved you are, come back to this letter. I'll always choose you. 🤍
</div>

<div class="footer">
Happy Birthday once again, My Boy. 🤍
</div>

</div>

<button onclick="startHearts()">Open Love</button>

</div>

<script>
// ===== STAR GENERATOR =====
const stars = document.querySelector('.stars');

for(let i=0;i<70;i++){
let s = document.createElement('div');
s.className = 'star';
s.style.left = Math.random()*100 + "vw";
s.style.top = Math.random()*100 + "vh";
s.style.animationDuration = (3 + Math.random()*5) + "s";
s.style.opacity = Math.random();
stars.appendChild(s);
}

// ===== SURAT TEKS (VERSI FINAL INDONESIA) =====
const messages = [
"Happy Birthday, Sayang. 🎉🤍",
"I love you more than yesterday, but less than tomorrow.",
"Sayang, selamat ulang tahun yaa. 🤍",
"Terima kasih karena sudah bertahan sejauh ini.",
"Terima kasih sudah menjadi tempat pulang yang selalu membuat aku merasa tenang.",
"Aku bersyukur pernah menjadi bagian dari perjalananmu.",
"Katanya, semakin dewasa ulang tahun bukan tentang meriah, tapi tentang siapa yang tetap ada.",
"Aku berharap semua doa baik selalu menemukan jalan ke kamu.",
"Tetap jadi Radit yang aku kenal. Tetap jadi seseorang yang baik dan penyayang.",
"Dan kalau suatu saat aku diberi kesempatan memilih lagi...",
"I'd still choose you, in every lifetime. 🤍"
];

let textIndex = 0;

// ===== OPEN ENVELOPE =====
function openEnvelope(){
const env = document.querySelector('.envelope');
const letter = document.getElementById('letter');

env.classList.add('open');

setTimeout(()=>{
letter.style.display = "block";
typeMessages();
startConfetti();
startHearts();
showPolaroid();
},800);
}

// ===== TYPE PER KALIMAT =====
function typeMessages(){
const el = document.getElementById("text");
el.innerHTML = "";
textIndex = 0;

function showNext(){
if(textIndex < messages.length){
el.innerHTML += messages[textIndex] + "\n\n";
textIndex++;
setTimeout(showNext,1200);
}
}

showNext();
}

// ===== HEARTS UPGRADE =====
function startHearts(){
setInterval(()=>{
const h = document.createElement("div");
h.className = "heart";
h.innerHTML = "🤍";

h.style.left = Math.random()*100 + "vw";
h.style.fontSize = (10 + Math.random()*18) + "px";
h.style.animationDuration = (3 + Math.random()*3) + "s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);
},250);
}

// ===== CONFETTI UPGRADE =====
function startConfetti(){
for(let i=0;i<120;i++){
const c = document.createElement("div");
c.className = "confetti";

c.style.left = Math.random()*100 + "vw";
c.style.background = ["#ffffff","#a8c7ff","#e6f0ff"][Math.floor(Math.random()*3)];
c.style.animationDuration = (3 + Math.random()*3) + "s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);
}
}

// ===== POLAROID SEQUENCIAL =====
function showPolaroid(){
const imgs = document.querySelectorAll(".polaroid img");

imgs.forEach((img, i)=>{
setTimeout(()=>{
img.classList.add("show");
}, i * 800);
});
}

</script>

</body>
</html>
