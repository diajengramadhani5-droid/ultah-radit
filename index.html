<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday рЯ§Н</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background: linear-gradient(135deg,#0b1f33,#102a43,#0f2438);
color:white;
text-align:center;
overflow-x:hidden;
}

/* TITLE */
.title{
margin-top:35px;
font-size:26px;
font-weight:700;
}

.date{
opacity:0.7;
margin-bottom:20px;
}

/* ENVELOPE */
.envelope{
width:210px;
height:135px;
margin:35px auto;
background:#fff;
border-radius:12px;
position:relative;
cursor:pointer;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
transition:0.3s;
}

.envelope:hover{
transform:scale(1.03);
}

.envelope:before{
content:'';
position:absolute;
top:0;
left:0;
border-left:105px solid transparent;
border-right:105px solid transparent;
border-top:75px solid #0b1f33;
}

/* LETTER */
.letter{
display:none;
background:rgba(255,255,255,0.96);
color:#0b1f33;
width:90%;
max-width:520px;
margin:20px auto;
padding:20px;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
text-align:left;
}

/* TEXT */
#text{
white-space:pre-line;
font-size:14px;
line-height:1.6;
}

/* POLAROID */
.polaroid{
display:flex;
justify-content:center;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.polaroid img{
width:90px;
height:90px;
object-fit:cover;
border:5px solid white;
opacity:0;
transition:0.6s;
}

.polaroid img.show{
opacity:1;
}

/* рЯ§Н HEART FIX */
.heart{
position:fixed;
top:-10px;
font-size:18px;
pointer-events:none;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(110vh);
opacity:0;
}
}

/* рЯОЙ CONFETTI FIX */
.confetti{
position:fixed;
width:6px;
height:10px;
top:-10px;
pointer-events:none;
animation:drop linear forwards;
z-index:998;
}

@keyframes drop{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* BUTTON */
button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#0b1f33;
color:white;
cursor:pointer;
}

/* YOUTUBE */
iframe{
margin-top:15px;
width:100%;
max-width:520px;
height:250px;
border-radius:12px;
}

.ps{
margin-top:15px;
font-style:italic;
opacity:0.8;
font-size:13px;
}

.footer{
margin-top:15px;
font-weight:700;
}

</style>
</head>

<body>

<div class="title">Happy Birthday, Sayang рЯ§Н</div>
<div class="date">7 July 2007 рЯ§Н</div>

<div class="envelope" onclick="openLetter()"></div>

<div class="letter" id="letter">

<h2>From My Green To Your Blue рЯ§Н</h2>

<div id="text"></div>

<div class="polaroid">
<img src="foto1.jpeg">
<img src="foto2.jpeg">
<img src="foto3.jpeg">
</div>

<iframe src="https://www.youtube.com/embed/HM3DeT4UXqM" allowfullscreen></iframe>

<div class="ps">
P.S. If someday you ever wonder how loved you are, come back to this letter. I'll always choose you. рЯ§Н
</div>

<div class="footer">
Happy Birthday once again, My Boy. рЯ§Н
</div>

</div>

<button onclick="startHearts()">Open Love</button>

<script>

/* OPEN */
function openLetter(){
document.getElementById("letter").style.display="block";
typeText();
startConfetti();
startHearts();
showPhotos();
}

/* TEXT */
const msg = `Happy Birthday, Sayang. рЯОЙрЯ§Н

 love you more than yesterday,
less than tomorrow.

Sayanggg, selamat ulang tahun yaa...

Terima kasih udah bertahan sejauh ini. Makasih karena udah jadi rumah yang selalu buat aku ngerasa tenang.
Makasih selalu tetap sayang sama aku walaupun aku sering buat kamu capek sama sikap aku.
Terima kasih ya, sudah mengizinkan aku jadi bagian dari ceritamu di sepanjang tahun lalu.

Katanya, makin dewasa ulang tahun bukan lagi tentang seberapa ramai pesta, 
tapi tentang siapa yang tetap tinggal di saat dunia lagi nggak baik-baik aja.
Terima kasih sudah hadir dan menjadi seseorang yang selalu berhasil bikin hari-hariku lebih berwarna.
Terima kasih karena udah jadi versi terbaik dari diri kamu.

Karena itu, aku bersyukur bisa ngerayain kamu di tahun ini. 
Dan kamu pantas untuk dirayakan, meskipun kecil-kecilan.
Tetap semangat mengejar semua impianmu dan jangan lupa selalu tersenyum yaa. рЯТЩ

Semoga di usia ini tangki cintamu terisi penuh, duniamu terasa lebih teduh,
lebih banyak kebahagiaan, rezeki, dan alasan untuk bersyukur.

Happy Birthday once again, My Boy. рЯ§Н

Thank you for existing...
See you in all the birthdays we'll celebrate together.рЯ§Н

вЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄПвЭ§пЄП`;

function typeText(){
let i=0;
let el=document.getElementById("text");
el.innerHTML="";
let t=setInterval(()=>{
el.innerHTML+=msg[i];
i++;
if(i>=msg.length) clearInterval(t);
},35);
}

/* рЯ§Н HEART FIX */
function startHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="рЯ§Н";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(12+Math.random()*18)+"px";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},200);
}

/* рЯОЙ CONFETTI FIX */
function startConfetti(){
for(let i=0;i<140;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=["#fff","#cfe8ff","#a8c7ff"][Math.floor(Math.random()*3)];
c.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),6000);
}
}

/* POLAROID */
function showPhotos(){
document.querySelectorAll(".polaroid img").forEach((img,i)=>{
setTimeout(()=>img.classList.add("show"),i*700);
});
}

</script>

</body>
</html>
